<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="icon" type="image/png" href="https://cdn.hackclub.com/019ebadc-fc40-739e-9e9f-366c6b1a25ad/favicon-32x32.png">
    <style>
        section {
            margin-top: 50px;
        
        }
        body {
            background-color: white;
            background-image:url("https://cdn.hackclub.com/019eba81-597a-7910-8f11-101af9f625a7/Untitled%20design%20(23).png");
            margin-left: 10% ;
            margin-right: 10%;
            margin-top: 80px;
            margin-bottom: 150px;
        }

        p {
            font-size:large;
        }

        img {
            margin-top: 20px;
            width: 100%;
            border-radius: 12px;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.7);
        }

        .imges {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 30px;
        }

    </style>
</head>
<body>
    <h1>Gallery</h1>
    <p style="margin-top: 25px;">A lot has changes in the few years.</p>
    <p> Different people, different dreams, different versions of me. This is just a small collection of the moments I dont want to forget.</p>
    <section class="imges">
        <img src="https://cdn.hackclub.com/019ebac0-8b78-7df4-80ef-2b430d1b64ed/WhatsApp%20Image%202026-06-12%20at%2012.50.43%20PM.jpg" alt="">
        <img src="https://cdn.hackclub.com/019ebac4-6a77-750d-a2b5-dbdb7b332372/WhatsApp%20Image%202026-06-12%20at%2012.50.44%20PM.jpeg" alt="">
        <img src="https://cdn.hackclub.com/019ebac7-6e04-717b-8ff7-68182d2f509e/WhatsApp%20Image%202026-06-12%20at%2012.50.44%20PM%20(1).jpeg" alt="">
        <img src="https://cdn.hackclub.com/019ebacd-6f8f-78ad-b2cc-1d0cccf81f36/WhatsApp%20Image%202026-06-12%20at%2012.50.42%20PM.jpeg" alt="">
    </section>
</body>
</html>
